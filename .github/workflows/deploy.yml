name: Deploy CMP to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer les dépendances
        run: npm install

      - name: Compiler le projet
        run: npm run build

      - name: Installer les navigateurs Playwright
        run: npx playwright install --with-deps

      - name: Lancer le serveur de test
        run: npx serve . -l 3000 &
        # Le & lance le serveur en arrière-plan

      - name: Attendre que le serveur soit prêt
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Lancer les tests Playwright
        run: npm test

      - name: Publier le rapport de tests en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    needs: build-and-test # ✅ Deploy uniquement si les tests passent
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Installer les dépendances
        run: npm install

      - name: Compiler le projet
        run: npm run build

      - name: Publier sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
